<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
</head>
<body>
    <h1>Login</h1>
    {% if error %}
        <p id="error" style="color:red;">{{ error }}</p>
    {% endif %}
    <form method="POST" action="/">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" required>
        <button type="submit" id="login">Login</button>
    </form>
</body>
</html>
