# Everything the marker needs must come up with a single: docker-compose up
services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: web-server
    environment:
      # Bind address supplied via env so it is not hard-coded in app.py.
      FLASK_HOST: 0.0.0.0
      SECRET_KEY: change-me-for-the-test
    ports:
      - "8000:5000"
    networks:
      - appnet

  nginx:
    image: nginx:alpine
    container_name: nginx-proxy
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - web
    networks:
      - appnet

  sonarqube:
    image: sonarqube:community
    container_name: sonarqube
    ports:
      - "9000:9000"
    environment:
      SONAR_ES_BOOTSTRAP_CHECKS_DISABLE: "true"
    volumes:
      - sonarqube_data:/opt/sonarqube/data
      - sonarqube_extensions:/opt/sonarqube/extensions
      - sonarqube_logs:/opt/sonarqube/logs
    networks:
      - appnet

volumes:
  sonarqube_data:
  sonarqube_extensions:
  sonarqube_logs:

networks:
  appnet:
