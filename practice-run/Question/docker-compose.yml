services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: web-server
    environment:
      # Bind address via env so it is not hard-coded in app.py (SonarQube hotspot).
      FLASK_HOST: 0.0.0.0
    ports:
      - "8000:5000"     # optional: hit Flask directly for debugging
    networks:
      - appnet

  nginx:
    image: nginx:alpine
    container_name: nginxwebsvr
    ports:
      - "80:80"         # the app is served at http://127.0.0.1/
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - web
    networks:
      - appnet

networks:
  appnet:
